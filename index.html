<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GGomi">
    
    <title>GGomi 가계부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-color: #F9F4F0;
            --main-color: #78350f;
            --shadow-dark: #e1dad4;
            --shadow-light: #ffffff;
        }

        body { 
            background: var(--bg-color); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        .neu-btn {
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--main-color);
            font-weight: 800;
        }

        .neu-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .neu-card {
            border-radius: 20px;
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            padding: 24px;
            margin-bottom: 20px;
        }

        .balance-card { 
            box-shadow: 0 10px 30px -5px rgba(120, 53, 15, 0.2); 
        }

        #modal::-webkit-scrollbar { display: none; }
        input, select { background: transparent; outline: none; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png" alt="GGomi Logo" class="w-14 h-14 rounded-2xl shadow-sm">
                <h1 class="text-4xl font-black text-amber-900 tracking-tighter">GGomi</h1>
            </div>
            <button onclick="toggleForm(true)" class="neu-btn w-16 h-16 rounded-full text-4xl">+</button>
        </header>

        <div class="bg-amber-900 rounded-3xl p-7 mb-10 text-white balance-card">
            <p id="filterTitle" class="text-amber-200 text-xs font-bold tracking-widest mb-1">전체 결과 합계</p>
            <h2 id="totalAmount" class="text-5xl font-black tracking-tight">0원</h2>
        </div>

        <div class="neu-card space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-b border-amber-200 pb-1">
                    <label class="text-[10px] font-bold text-amber-700 uppercase tracking-widest">시작일</label>
                    <input type="date" id="startDate" class="w-full text-sm font-bold text-amber-900">
                </div>
                <div class="border-b border-amber-200 pb-1">
                    <label class="text-[10px] font-bold text-amber-700 uppercase tracking-widest">종료일</label>
                    <input type="date" id="endDate" class="w-full text-sm font-bold text-amber-900">
                </div>
            </div>
            <div class="flex gap-3">
                <select id="sCat" class="flex-1 bg-amber-50/50 p-4 rounded-2xl text-sm font-bold text-amber-900 border border-amber-100">
                    <option value="전체">모든 카테고리</option>
                </select>
                <button onclick="loadData()" class="neu-btn px-6 py-4 text-sm">조회</button>
            </div>
        </div>

        <div id="list" class="space-y-5 pt-4">
            <p class="text-center py-20 text-amber-200 text-xl font-bold animate-pulse">데이터 연결 중...</p>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 p-8 overflow-y-auto" style="background: var(--bg-color);">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black text-amber-900">내역 기록</h2>
            <button onclick="toggleForm(false)" class="neu-btn w-12 h-12 rounded-full text-3xl">&times;</button>
        </div>
        
        <div class="space-y-10">
            <div class="neu-card !p-6">
                <label class="block text-xs font-bold text-amber-700 mb-2 uppercase tracking-widest">날짜</label>
                <input type="date" id="inDate" class="w-full text-2xl font-bold text-amber-900 border-b-2 border-amber-100 pb-2">
            </div>
            <div class="neu-card !p-6">
                <label class="block text-xs font-bold text-amber-700 mb-2 uppercase tracking-widest">구분</label>
                <select id="inCat" class="w-full text-2xl font-bold text-amber-900 border-b-2 border-amber-100 pb-2"></select>
            </div>
            <div class="neu-card !p-6">
                <label class="block text-xs font-bold text-amber-700 mb-2 uppercase tracking-widest">항목</label>
                <input type="text" id="inItem" placeholder="내용 입력" class="w-full text-2xl font-bold text-amber-900 border-b-2 border-amber-100 pb-2 placeholder:text-amber-100">
            </div>
            <div class="neu-card !p-6">
                <label class="block text-xs font-bold text-amber-700 mb-2 uppercase tracking-widest">금액</label>
                <input type="number" id="inAmount" placeholder="0" class="w-full text-2xl font-bold text-amber-900 border-b-2 border-amber-100 pb-2 placeholder:text-amber-100">
            </div>
            <button onclick="save()" id="sBtn" class="neu-btn w-full p-6 text-2xl font-black mb-10">저장하기</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyZTJToAWOXv1Rq4nClb8fPwz1vnh1kHjGjUh6lC379XEAcOofg6fqBPT4bxqBD-Ny0Tg/exec";

        async function init() {
            document.getElementById('inDate').valueAsDate = new Date();
            try {
                const catRes = await fetch(`${API_URL}?action=getCategories`);
                const cats = await catRes.json();
                const sCat = document.getElementById('sCat');
                const inCat = document.getElementById('inCat');
                cats.forEach(c => {
                    sCat.innerHTML += `<option value="${c}">${c}</option>`;
                    inCat.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } catch(e) { console.error("카테고리 로드 실패"); }
            loadData();
        }

        async function loadData() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const cat = document.getElementById('sCat').value;
            const listDiv = document.getElementById('list');
            const totalDisplay = document.getElementById('totalAmount');
            
            listDiv.innerHTML = '<p class="text-center py-10 text-amber-200 font-bold">조회 중...</p>';

            try {
                const res = await fetch(`${API_URL}?action=getEntries&start=${start}&end=${end}&category=${encodeURIComponent(cat)}`);
                const data = await res.json();
                
                const sum = data.reduce((acc, row) => acc + Number(row[3]), 0);
                totalDisplay.innerText = sum.toLocaleString() + '원';
                document.getElementById('filterTitle').innerText = `${cat} 검색 결과 합계`;

                listDiv.innerHTML = data.length ? data.map(row => `
                    <div class="neu-card flex justify-between items-center !mb-5">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[11px] font-black text-amber-600 uppercase tracking-widest">${row[1]}</span>
                                <span class="text-[11px] font-bold text-amber-400">${new Date(row[0]).toLocaleDateString()}</span>
                            </div>
                            <div class="text-2xl font-bold text-amber-900 leading-tight">${row[2]}</div>
                        </div>
                        <div class="text-right ml-4">
                            <div class="text-2xl font-black text-amber-700">${Number(row[3]).toLocaleString()}원</div>
                        </div>
                    </div>
                `).join('') : '<p class="text-center py-20 text-amber-300 font-bold">내역이 없습니다.</p>';
            } catch(err) {
                listDiv.innerHTML = '<p class="text-center py-20 text-red-300 font-bold">데이터 연결 실패</p>';
            }
        }

        async function save() {
            const btn = document.getElementById('sBtn');
            const payload = {
                date: document.getElementById('inDate').value,
                category: document.getElementById('inCat').value,
                item: document.getElementById('inItem').value,
                amount: document.getElementById('inAmount').value
            };
            if(!payload.item || !payload.amount) return alert('항목과 금액을 입력하세요.');
            
            btn.innerText = "저장 중...";
            btn.style.opacity = "0.5";
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                location.reload(); 
            } catch(e) {
                alert("저장 실패");
                btn.innerText = "저장하기";
                btn.style.opacity = "1";
            }
        }

        function toggleForm(show) { document.getElementById('modal').classList.toggle('hidden', !show); }
        init();
    </script>
</body>
</html>
