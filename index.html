<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGomi 가계부</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-black text-indigo-600 tracking-tighter">GGomi</h1>
            <button onclick="document.getElementById('modal').style.display='block'" class="bg-indigo-600 text-white w-16 h-16 rounded-full text-4xl shadow-xl">+</button>
        </header>
        <div id="list" class="space-y-4">
            <p id="status" class="text-center text-gray-400 py-20 text-xl font-bold text-indigo-400 animate-pulse">데이터 연결 시도 중...</p>
        </div>
    </div>

    <div id="modal" style="display:none;" class="fixed inset-0 bg-white z-50 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold text-indigo-900">내역 기록</h2>
            <button onclick="document.getElementById('modal').style.display='none'" class="text-5xl text-gray-300">&times;</button>
        </div>
        <div class="space-y-8">
            <div><label class="block text-gray-400 font-bold mb-2">날짜</label>
            <input type="date" id="inDate" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none focus:border-indigo-600"></div>
            <div><label class="block text-gray-400 font-bold mb-2">구분</label>
            <select id="inCat" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none">
                <option value="기타">카테고리 불러오는 중...</option>
            </select></div>
            <div><label class="block text-gray-400 font-bold mb-2">항목</label>
            <input type="text" id="inItem" placeholder="어디에 쓰셨나요?" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none"></div>
            <div><label class="block text-gray-400 font-bold mb-2">금액</label>
            <input type="number" id="inAmount" placeholder="0" class="w-full border-b-4 border-gray-100 p-4 text-2xl outline-none"></div>
            <button onclick="save()" id="sBtn" class="w-full bg-indigo-600 text-white p-6 rounded-3xl text-3xl font-bold shadow-2xl active:scale-95 transition-all">저장하기</button>
        </div>
    </div>

    <script>
        // [주의] 여기에 새로 받은 웹 앱 URL을 붙여넣으세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzrhz7BPmIYeycQnBKzyEzQfEfBYD5GgpWiXnp2x8xK6r9ahTKJslO86duFCXU5hbcUxw/exec";

        async function init() {
            document.getElementById('inDate').valueAsDate = new Date();
            // 카테고리 로드
            try {
                const res = await fetch(`${API_URL}?action=getCat`);
                const cats = await res.json();
                document.getElementById('inCat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
            } catch(e) {
                document.getElementById('inCat').innerHTML = '<option value="기타">기타</option><option value="현금">현금</option>';
            }
            loadData();
        }

        async function loadData() {
            const list = document.getElementById('list');
            try {
                const res = await fetch(`${API_URL}?action=get`);
                const data = await res.json();
                if (data.length === 0) {
                    list.innerHTML = `<p class="text-center text-gray-400 py-20 text-xl">입력된 내역이 없습니다.</p>`;
                    return;
                }
                list.innerHTML = data.map(row => `
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center mb-2">
                        <div><div class="text-2xl font-bold mb-1 text-gray-800">${row[2]}</div><div class="text-sm text-gray-400">${row[1]} | ${new Date(row[0]).toLocaleDateString().slice(2)}</div></div>
                        <div class="text-right text-2xl font-black text-indigo-600">${Number(row[3]).toLocaleString()}원</div>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = `<div class="p-6 bg-red-50 text-red-500 rounded-2xl text-center">연결 실패: URL을 확인하세요.</div>`;
            }
        }

        async function save() {
            const btn = document.getElementById('sBtn');
            btn.innerText = "저장 중..."; btn.disabled = true;
            const payload = {
                date: document.getElementById('inDate').value,
                category: document.getElementById('inCat').value,
                item: document.getElementById('inItem').value,
                amount: document.getElementById('inAmount').value
            };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("저장 성공!");
                location.reload();
            } catch(e) {
                alert("저장 실패. 인터넷 연결이나 URL을 확인하세요.");
                btn.innerText = "저장하기"; btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
