<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGomi 가계부</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 font-sans">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-black text-indigo-600">GGomi</h1>
            <button onclick="document.getElementById('m').style.display='flex'" class="bg-indigo-600 text-white w-16 h-16 rounded-full text-4xl shadow-xl active:scale-95">+</button>
        </header>

        <div id="list" class="space-y-4">
            <div class="text-center py-20 text-gray-400 font-bold">내역을 불러오는 중...</div>
        </div>
    </div>

    <div id="m" style="display:none;" class="fixed inset-0 bg-white z-50 flex-col p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">기록하기</h2>
            <button onclick="document.getElementById('m').style.display='none'" class="text-5xl text-gray-300">&times;</button>
        </div>
        <div class="space-y-6">
            <input type="date" id="d" class="w-full border-b-4 p-4 text-2xl outline-none">
            <select id="c" class="w-full border-b-4 p-4 text-2xl outline-none">
                <option>현금</option><option>코인</option><option>아버지</option><option>기타</option>
            </select>
            <input type="text" id="i" placeholder="항목" class="w-full border-b-4 p-4 text-2xl outline-none">
            <input type="number" id="a" placeholder="금액" class="w-full border-b-4 p-4 text-2xl outline-none">
            <button onclick="save()" id="s" class="w-full bg-indigo-600 text-white p-6 rounded-3xl text-3xl font-bold">저장하기</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzkMqum-tUIwWskpPoaZzrelSaRRhJL_GqNY8iKm9BPSaq_MhPoSE8P0IvohfEI1-wOmw/exec";

        async function load() {
            try {
                const r = await fetch(URL);
                const data = await r.json();
                document.getElementById('list').innerHTML = data.length ? data.map(row => `
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex justify-between items-center">
                        <div><div class="text-2xl font-bold">${row[2]}</div><div class="text-sm text-gray-400">${row[1]} | ${new Date(row[0]).toLocaleDateString().slice(5)}</div></div>
                        <div class="text-2xl font-black text-indigo-600">${Number(row[3]).toLocaleString()}원</div>
                    </div>
                `).join('') : '<p class="text-center py-20 text-gray-400">내역이 없습니다.</p>';
            } catch(e) {
                document.getElementById('list').innerHTML = '<div class="p-10 bg-red-50 text-red-500 rounded-3xl text-center">연결 실패! URL을 확인하세요.</div>';
            }
        }

        async function save() {
            const btn = document.getElementById('s');
            btn.innerText = "저장 중...";
            const body = {
                category: document.getElementById('c').value,
                item: document.getElementById('i').value,
                amount: document.getElementById('a').value,
                date: document.getElementById('d').value
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(body) });
            location.reload();
        }

        document.getElementById('d').valueAsDate = new Date();
        load();
    </script>
</body>
</html>
