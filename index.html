<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="GGOMI">
    <title>GGOMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #F9F4F0; --main: #78350f; --shadow-dark: #e1dad4; --shadow-light: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* 뉴모피즘 스타일 */
        .neu-btn { 
            border-radius: 15px; background: var(--bg) !important; 
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); 
            color: var(--main) !important; font-weight: 800; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; border: none; outline: none;
        }
        .neu-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); transform: scale(0.98); }
        
        .neu-card { 
            border-radius: 20px; background: var(--bg) !important; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); 
        }

        /* 합계 카드 (노란 그림자 삭제, 그림자 투명도 조절) */
        .balance-card { box-shadow: 0 10px 20px -5px rgba(120, 53, 15, 0.15); border: none; }

        /* 내역 카드 슬라이드 삭제 */
        .card-container { position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 16px; }
        .delete-btn { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 70px; 
            background: #ef4444; color: white; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border-radius: 0 20px 20px 0; 
            transform: translateX(100%); transition: 0.3s; z-index: 1; 
        }
        .card-container.open .neu-card { transform: translateX(-70px); border-radius: 20px 0 0 20px; }
        .card-container.open .delete-btn { transform: translateX(0); }

        select { appearance: none; padding-left: 15px !important; background: transparent; outline: none; border: none; width: 100%; }
        input { background: transparent; outline: none; border: none; width: 100%; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png" class="w-14 h-14 rounded-2xl">
                <h1 class="text-4xl font-black text-amber-900 tracking-tighter uppercase">GGOMI</h1>
            </div>
            <button onclick="toggleForm(true)" class="neu-btn w-16 h-16 rounded-full text-4xl">+</button>
        </header>

        <div class="bg-amber-900 rounded-3xl p-7 mb-10 text-white balance-card">
            <p id="filterTitle" class="text-amber-100 text-xs font-bold tracking-widest mb-1 opacity-80">전체 결과 합계</p>
            <h2 id="totalAmount" class="text-5xl font-black tracking-tight">0원</h2>
        </div>

        <div class="neu-card p-6 mb-8 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-b border-gray-200 pb-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">시작일</label>
                    <input type="date" id="startDate" class="text-sm font-bold text-gray-800">
                </div>
                <div class="border-b border-gray-200 pb-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">종료일</label>
                    <input type="date" id="endDate" class="text-sm font-bold text-gray-800">
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex-1 bg-gray-100/50 rounded-2xl overflow-hidden">
                    <select id="sCat" class="p-4 text-sm font-bold text-gray-800"></select>
                </div>
                <button onclick="loadData()" class="neu-btn px-6 py-4 text-sm font-bold">조회</button>
            </div>
        </div>

        <div id="list" class="space-y-1">
            <p class="text-center py-20 text-gray-300 font-bold animate-pulse">서버 연결 중...</p>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 p-8 overflow-y-auto" style="background: var(--bg);">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black text-amber-900">기록하기</h2>
            <button onclick="toggleForm(false)" class="neu-btn w-12 h-12 rounded-full text-3xl">&times;</button>
        </div>
        <div class="space-y-8">
            <div class="neu-card p-6"><label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">날짜</label><input type="date" id="inDate" class="text-2xl font-bold text-gray-800"></div>
            <div class="neu-card p-6"><label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">구분</label><select id="inCat" class="text-2xl font-bold text-gray-800 px-4"></select></div>
            <div class="neu-card p-6"><label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">항목</label><input type="text" id="inItem" placeholder="내용 입력" class="text-2xl font-bold text-gray-800"></div>
            <div class="neu-card p-6"><label class="text-xs font-bold text-gray-400 block mb-2 uppercase tracking-widest">금액</label><input type="text" id="inAmount" inputmode="numeric" oninput="fNum(this)" placeholder="0" class="text-2xl font-bold text-amber-800"></div>
            <button onclick="save()" id="sBtn" class="w-full p-6 text-2xl font-black bg-amber-900 text-white rounded-3xl shadow-xl active:scale-95 transition-all">저장하기</button>
        </div>
    </div>

    <script>
        // 🚨 여기에 구글에서 새로 배포한 주소를 넣으세요
        const API_URL = "여기에_새_배포_URL_넣으세요";

        function fNum(obj) {
            let v = obj.value.replace(/,/g, "").replace(/\D/g, "");
            obj.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        async function init() {
            document.getElementById('inDate').valueAsDate = new Date();
            try {
                const res = await fetch(`${API_URL}?action=getCat`);
                const cats = await res.json();
                const sc = document.getElementById('sCat');
                const ic = document.getElementById('inCat');
                sc.innerHTML = '<option value="전체">모든 카테고리</option>';
                cats.forEach(c => {
                    sc.innerHTML += `<option value="${c}">${c}</option>`;
                    ic.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } catch(e) { console.error("API 로드 실패"); }
            loadData();
        }

        async function loadData() {
            const listDiv = document.getElementById('list');
            const s = document.getElementById('startDate').value;
            const e = document.getElementById('endDate').value;
            const c = document.getElementById('sCat').value;

            try {
                const res = await fetch(`${API_URL}?start=${s}&end=${e}&cat=${encodeURIComponent(c || '전체')}`);
                const data = await res.json();
                
                const sum = data.reduce((acc, r) => acc + Number(r.amount), 0);
                document.getElementById('totalAmount').innerText = sum.toLocaleString() + '원';

                if (data.length === 0) {
                    listDiv.innerHTML = '<p class="text-center py-20 text-gray-400 font-bold">내역이 없습니다.</p>';
                    return;
                }

                listDiv.innerHTML = data.map(r => `
                    <div class="card-container" onclick="this.classList.toggle('open')">
                        <div class="neu-card p-6 flex justify-between items-center relative z-10">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest">${r.category}</span>
                                    <span class="text-[11px] font-bold text-gray-400">${new Date(r.date).toLocaleDateString()}</span>
                                </div>
                                <div class="text-2xl font-bold text-gray-800 leading-tight">${r.item}</div>
                            </div>
                            <div class="text-2xl font-black text-amber-800 ml-4">${Number(r.amount).toLocaleString()}원</div>
                        </div>
                        <div class="delete-btn" onclick="del(${r.rowIdx})">삭제</div>
                    </div>
                `).join('');
            } catch(err) {
                listDiv.innerHTML = '<p class="text-center py-20 text-red-400 font-bold">내역 로드 실패<br>API 주소를 다시 확인하세요.</p>';
            }
        }

        async function del(idx) {
            if(!confirm("삭제하시겠습니까?")) return;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowIdx: idx }) });
            loadData();
        }

        async function save() {
            const btn = document.getElementById('sBtn');
            const amt = document.getElementById('inAmount').value.replace(/,/g, "");
            if(!amt || !document.getElementById('inItem').value) return alert("항목과 금액을 입력하세요!");
            btn.innerText = "저장 중...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({
                category: document.getElementById('inCat').value,
                item: document.getElementById('inItem').value,
                amount: amt,
                date: document.getElementById('inDate').value
            }) });
            location.reload();
        }

        function toggleForm(s) { document.getElementById('modal').classList.toggle('hidden', !s); }
        init();
    </script>
</body>
</html>
