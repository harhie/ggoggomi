<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GGOMI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #F9F4F0; --main: #78350f; --dark: #e1dad4; --light: #ffffff; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .neu-btn { border-radius: 15px; background: var(--bg) !important; box-shadow: 5px 5px 10px var(--dark), -5px -5px 10px var(--light); color: var(--main) !important; font-weight: 800; display: flex; align-items: center; justify-content: center; border: none; outline: none; transition: 0.2s; }
        .neu-btn:active { box-shadow: inset 3px 3px 6px var(--dark), inset -3px -3px 6px var(--light); transform: scale(0.98); }
        .neu-card { border-radius: 20px; background: var(--bg) !important; box-shadow: 6px 6px 12px var(--dark), -6px -6px 12px var(--light); transition: 0.3s; }
        .balance-card { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: none; }
        .card-container { position: relative; margin-bottom: 25px; padding: 5px; }
        .btn-group { position: absolute; right: 10px; top: 15px; bottom: 15px; display: flex; gap: 8px; z-index: 0; opacity: 0; transition: 0.2s; }
        .action-btn { width: 65px; height: 100%; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: white; }
        .edit-btn { background: var(--main); }
        .del-btn { background: #ef4444; }
        .card-container.open .neu-card { transform: translateX(-150px); box-shadow: none; }
        .card-container.open .btn-group { opacity: 1; }
        select, input { background: transparent; outline: none; border: none; width: 100%; }
        select { appearance: none; padding-left: 15px !important; }
        .loading-text { font-size: 11px; color: #ef4444; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/harhie/siteimage/main/ggo.png" class="w-14 h-14 rounded-2xl shadow-sm">
                <h1 class="text-4xl font-black text-amber-900 uppercase tracking-tighter">GGOMI</h1>
            </div>
            <button onclick="openAddForm()" class="neu-btn w-16 h-16 rounded-full text-4xl">+</button>
        </header>

        <div class="bg-amber-900 rounded-3xl p-7 mb-10 text-white balance-card">
            <p id="filterTitle" class="text-amber-100 text-xs font-bold tracking-widest mb-1 opacity-70">전체 결과 합계</p>
            <h2 id="totalAmount" class="text-3xl font-black tracking-tight truncate">0원</h2>
        </div>

        <div class="neu-card p-6 mb-8 space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="border-b border-gray-200 pb-1"><label class="text-[10px] font-bold text-gray-400 uppercase">시작일</label><input type="date" id="startDate" class="text-sm font-bold text-gray-800"></div>
                <div class="border-b border-gray-200 pb-1"><label class="text-[10px] font-bold text-gray-400 uppercase">종료일</label><input type="date" id="endDate" class="text-sm font-bold text-gray-800"></div>
            </div>
            <div class="flex gap-3"><div class="flex-1 bg-gray-100/50 rounded-2xl overflow-hidden"><select id="sCat" class="p-4 text-sm font-bold text-gray-800"></select></div><button onclick="loadData()" class="neu-btn px-6 py-4 text-sm font-bold">조회</button></div>
        </div>
        <div id="list" class="space-y-1"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 p-8 overflow-y-auto" style="background: var(--bg);">
        <div class="flex justify-between items-center mb-12">
            <h2 id="modalTitle" class="text-3xl font-black text-amber-900">기록하기</h2>
            <button onclick="toggleForm(false)" class="neu-btn w-12 h-12 rounded-full text-3xl">&times;</button>
        </div>
        <div class="space-y-6">
            <input type="hidden" id="editRowIdx">
            <div class="neu-card p-5"><label class="text-xs font-bold text-gray-400 block mb-1 uppercase">날짜</label><input type="date" id="inDate" onchange="checkPrice()" class="w-full text-xl font-bold text-gray-800"></div>
            <div class="neu-card p-5"><label class="text-xs font-bold text-gray-400 block mb-1 uppercase">구분</label><select id="inCat" onchange="checkPrice()" class="text-xl font-bold text-gray-800 px-2"></select></div>
            <div class="neu-card p-5"><label class="text-xs font-bold text-gray-400 block mb-1 uppercase">항목</label><input type="text" id="inItem" placeholder="내용 입력" class="w-full text-xl font-bold text-gray-800"></div>

            <div id="qtyBox" class="neu-card p-5 opacity-40">
                <label class="text-xs font-bold text-gray-400 block mb-1 uppercase">수량 (개수)</label>
                <input type="number" id="inQty" step="any" inputmode="decimal" oninput="calcTotal()" placeholder="0.00" class="w-full text-xl font-bold text-gray-800">
            </div>
            
            <div class="neu-card p-5">
                <label class="text-xs font-bold text-gray-400 block mb-1 uppercase">금액(KRW) <span id="coinLoading" class="hidden loading-text ml-2">시세 확인 중...</span></label>
                <input type="text" id="inAmount" inputmode="numeric" oninput="fNum(this)" placeholder="0" class="w-full text-xl font-bold text-amber-800">
            </div>
            
            <button onclick="save()" id="sBtn" class="w-full p-5 text-xl font-black bg-amber-900 text-white rounded-3xl shadow-xl active:scale-95 transition-all">저장하기</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwyl6snoUZNwDK9W8lHpJHWOH-2iJZeh1PP0FsiKUo830CAFrAx_GfopDlWmRyPYf2f_A/exec";
        let unitPrice = 0;
        const COIN_MAP = { "코인-BTC": "bitcoin", "코인-ETH": "ethereum", "코인-USDT": "tether" };

        async function checkPrice() {
            const cat = document.getElementById('inCat').value;
            const date = document.getElementById('inDate').value;
            const coinId = COIN_MAP[cat];
            const qtyBox = document.getElementById('qtyBox');
            
            if (!coinId) { qtyBox.style.opacity = "0.4"; unitPrice = 0; return; }
            
            qtyBox.style.opacity = "1";
            document.getElementById('coinLoading').classList.remove('hidden');

            try {
                const [y, m, d] = date.split('-');
                // dd-mm-yyyy 포맷으로 전송
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/history?date=${d}-${m}-${y}&localization=false`);
                const data = await res.json();
                
                if (data.market_data && data.market_data.current_price) {
                    unitPrice = data.market_data.current_price.krw;
                    calcTotal(); 
                } else {
                    alert("해당 날짜의 시세 데이터가 없습니다.");
                    unitPrice = 0;
                }
            } catch (err) { alert("시세 로드 실패. 잠시 후 다시 시도하세요."); }
            finally { document.getElementById('coinLoading').classList.add('hidden'); }
        }

        function calcTotal() {
            const qty = parseFloat(document.getElementById('inQty').value) || 0;
            if (unitPrice > 0) {
                const total = Math.floor(unitPrice * qty);
                document.getElementById('inAmount').value = total.toLocaleString();
            }
        }

        function fNum(obj) {
            let v = obj.value.replace(/,/g, "").replace(/\D/g, "");
            obj.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        async function init() {
            document.getElementById('inDate').valueAsDate = new Date();
            const sc = document.getElementById('sCat'), ic = document.getElementById('inCat');
            try {
                const res = await fetch(`${API_URL}?action=getCat`), cats = await res.json();
                sc.innerHTML = '<option value="전체">모든 카테고리</option>';
                ic.innerHTML = '';
                cats.forEach(c => { sc.innerHTML += `<option value="${c}">${c}</option>`; ic.innerHTML += `<option value="${c}">${c}</option>`; });
            } catch(e) {}
            loadData();
        }

        async function loadData() {
            const listDiv = document.getElementById('list'), s = document.getElementById('startDate').value, e = document.getElementById('endDate').value, c = document.getElementById('sCat').value;
            try {
                const res = await fetch(`${API_URL}?start=${s}&end=${e}&cat=${encodeURIComponent(c || '전체')}`);
                const data = await res.json();
                document.getElementById('totalAmount').innerText = data.reduce((acc, r) => acc + Number(r.amount), 0).toLocaleString() + '원';
                listDiv.innerHTML = data.length ? data.map((r, idx) => `
                    <div class="card-container" onclick="this.classList.toggle('open')">
                        <div class="btn-group">
                            <div class="action-btn edit-btn" onclick="openEditForm('${idx}'); event.stopPropagation();">수정</div>
                            <div class="action-btn del-btn" onclick="del(${r.rowIdx}); event.stopPropagation();">삭제</div>
                        </div>
                        <div class="neu-card p-5 flex justify-between items-center relative z-10">
                            <div class="flex-1 overflow-hidden">
                                <div class="flex items-center gap-2 mb-1"><span class="text-[10px] font-black text-gray-500 uppercase">${r.category}</span><span class="text-[10px] font-bold text-gray-400">${new Date(r.date).toLocaleDateString()}</span></div>
                                <div class="text-base font-bold text-gray-800 leading-tight truncate">${r.item}</div>
                            </div>
                            <div class="text-lg font-black text-amber-800 ml-3 whitespace-nowrap">${Number(r.amount).toLocaleString()}원</div>
                        </div>
                    </div>`).join('') : '<p class="text-center py-20 text-gray-400 font-bold">내역이 없습니다.</p>';
                // currentData를 전역 변수 대신 이 안에서 관리하거나 data를 매개변수로 전달하도록 수정
                window.lastData = data; 
            } catch(err) { listDiv.innerHTML = '<p class="text-center py-20 text-red-400 font-bold">조회 실패</p>'; }
        }

        function openAddForm() { 
            document.getElementById('modalTitle').innerText = "기록하기"; 
            document.getElementById('editRowIdx').value = ""; 
            document.getElementById('inItem').value = ""; 
            document.getElementById('inAmount').value = ""; 
            document.getElementById('inQty').value = ""; 
            unitPrice = 0; 
            document.getElementById('inDate').valueAsDate = new Date(); 
            toggleForm(true); 
        }

        function openEditForm(idx) { 
            const r = window.lastData[idx]; 
            document.getElementById('modalTitle').innerText = "수정하기"; 
            document.getElementById('editRowIdx').value = r.rowIdx; 
            document.getElementById('inDate').value = new Date(r.date).toISOString().split('T')[0]; 
            document.getElementById('inCat').value = r.category; 
            document.getElementById('inItem').value = r.item; 
            document.getElementById('inAmount').value = Number(r.amount).toLocaleString(); 
            document.getElementById('inQty').value = "";
            toggleForm(true); 
        }

        async function save() { 
            const btn = document.getElementById('sBtn'), amt = document.getElementById('inAmount').value.replace(/,/g, ""), rowIdx = document.getElementById('editRowIdx').value; 
            if(!amt || !document.getElementById('inItem').value) return alert("내용을 입력하세요!"); 
            btn.innerText = "저장 중..."; 
            const action = rowIdx ? 'update' : 'add'; 
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: action, rowIdx: rowIdx, category: document.getElementById('inCat').value, item: document.getElementById('inItem').value, amount: amt, date: document.getElementById('inDate').value })}); 
            location.reload(); 
        }
        async function del(idx) { if(!confirm("삭제하시겠습니까?")) return; await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', rowIdx: idx }) }); location.reload(); }
        function toggleForm(s) { document.getElementById('modal').classList.toggle('hidden', !s); }
        init();
    </script>
</body>
</html>
